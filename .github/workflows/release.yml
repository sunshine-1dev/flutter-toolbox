name: Build & Release

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Regenerate Android project
        run: |
          # 保存源代码
          cp -r lib /tmp/lib_backup
          cp pubspec.yaml /tmp/pubspec_backup.yaml
          
          # 用 flutter create 生成完整项目结构
          flutter create --org com.example --project-name flutter_toolbox .
          
          # 恢复我们的源代码（覆盖模板代码）
          cp -r /tmp/lib_backup/* lib/
          cp /tmp/pubspec_backup.yaml pubspec.yaml

      - run: flutter pub get

      - run: flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk
