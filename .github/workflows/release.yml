name: Build & Release

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Regenerate Android project
        run: |
          cp -r lib /tmp/lib_backup
          cp pubspec.yaml /tmp/pubspec_backup.yaml
          flutter create --org com.example --project-name flutter_toolbox .
          cp -r /tmp/lib_backup/* lib/
          cp /tmp/pubspec_backup.yaml pubspec.yaml

      - name: Fix minSdkVersion
        run: |
          # Show current build.gradle for debugging
          echo "=== Before ==="
          grep -n "minSdk" android/app/build.gradle || true
          # Replace any form of minSdk setting
          cd android/app
          python3 -c "
          import re
          with open('build.gradle', 'r') as f:
              content = f.read()
          # Handle both Kotlin DSL and Groovy styles
          content = re.sub(r'minSdk\s*=\s*\S+', 'minSdk = 23', content)
          content = re.sub(r'minSdkVersion\s+\S+', 'minSdkVersion 23', content)
          with open('build.gradle', 'w') as f:
              f.write(content)
          "
          echo "=== After ==="
          grep -n "minSdk" build.gradle || true
          # Also try build.gradle.kts if it exists
          if [ -f build.gradle.kts ]; then
            python3 -c "
          import re
          with open('build.gradle.kts', 'r') as f:
              content = f.read()
          content = re.sub(r'minSdk\s*=\s*\S+', 'minSdk = 23', content)
          with open('build.gradle.kts', 'w') as f:
              f.write(content)
          "
            echo "=== KTS After ==="
            grep -n "minSdk" build.gradle.kts || true
          fi

      - run: flutter pub get

      - run: flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk
